services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./synthea:/app/synthea
      - ./server/config.json:/app/config.json
    environment:
      - PORT=3001
      - CLIENT_ORIGIN=http://localhost:5173
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped
