services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-3001}:3001"
    volumes:
      - ./synthea:/app/synthea
      - ./server/data:/app/data
    environment:
      - PORT=3001
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
    ports:
      - "${CLIENT_PORT:-5173}:80"
    depends_on:
      - server
    restart: unless-stopped
